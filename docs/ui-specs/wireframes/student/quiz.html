<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz — Project Amazon PH Academy Wireframe</title>
<link rel="stylesheet" href="../assets/tokens.css">
</head>
<body>
<div class="page-shell">
  <p class="page-kicker"><a href="../README.md">← wireframes index</a></p>
  <h1 class="page-title">Quiz</h1>
  <p class="page-route">.../lessons/[id]/quiz</p>
  <div class="wf-card">
        <div class="wf-card__head">
          <div class="wf-card__id"><span class="wf-card__name">Quiz</span><span class="wf-card__route">.../lessons/[id]/quiz</span></div>
          <span class="chip ready">API only, no UI</span>
        </div>
        <div class="wf-canvas">
          <div class="wf-bar"><span class="wf-navitem">Knowledge check</span><span class="wf-navitem">3 / 8</span></div>
          <div class="wf-block tint"><p class="wf-cap">Question</p><div class="wf-line w90"></div></div>
          <div class="wf-col">
            <div class="wf-block"><div class="wf-line w70" style="margin:0;"></div></div>
            <div class="wf-block"><div class="wf-line w60" style="margin:0;"></div></div>
            <div class="wf-block"><div class="wf-line w80" style="margin:0;"></div></div>
          </div>
          <div class="wf-bar"><span class="chip ready" style="padding:1px 6px;">Pass ≥ 70%</span><div class="wf-btn">Submit answer</div></div>
        </div>
      </div>
</div>
</body>
</html>
