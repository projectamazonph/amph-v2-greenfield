<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Course detail — Project Amazon PH Academy Wireframe</title>
<link rel="stylesheet" href="../assets/tokens.css">
</head>
<body>
<div class="page-shell">
  <p class="page-kicker"><a href="../README.md">← wireframes index</a></p>
  <h1 class="page-title">Course detail</h1>
  <p class="page-route">/courses/[slug]</p>
  <div class="wf-card">
        <div class="wf-card__head">
          <div class="wf-card__id"><span class="wf-card__name">Course detail</span><span class="wf-card__route">/courses/[slug]</span></div>
          <span class="chip built">Built</span>
        </div>
        <div class="wf-canvas">
          <div class="wf-bar"><div class="wf-navitems"><span class="wf-navitem">← Courses</span></div><div class="wf-avatar"></div></div>
          <div class="wf-split">
            <div>
              <div class="wf-block tint"><p class="wf-cap">Hero + tier + price</p><div class="wf-line thick w90"></div><div class="wf-btn" style="margin-top:5px;">Enroll</div></div>
              <div class="wf-block"><p class="wf-cap">Modules (accordion)</p><div class="wf-line w70"></div><div class="wf-line w60"></div><div class="wf-line w50"></div></div>
            </div>
            <div class="wf-vdivider"></div>
            <div>
              <div class="wf-block"><p class="wf-cap">Instructor</p><div class="wf-line w60"></div></div>
              <div class="wf-block"><p class="wf-cap">What you'll learn</p><div class="wf-line w80"></div><div class="wf-line w70"></div></div>
            </div>
          </div>
        </div>
      </div>
</div>
</body>
</html>
