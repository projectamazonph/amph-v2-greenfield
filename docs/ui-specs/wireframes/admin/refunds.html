<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Refunds — list + override — Project Amazon PH Academy Wireframe</title>
<link rel="stylesheet" href="../assets/tokens.css">
</head>
<body>
<div class="page-shell">
  <p class="page-kicker"><a href="../README.md">← wireframes index</a></p>
  <h1 class="page-title">Refunds — list + override</h1>
  <p class="page-route">/admin/refunds · override-refund</p>
  <div class="wf-card span2">
        <div class="wf-card__head">
          <div class="wf-card__id"><span class="wf-card__name">Refunds — list + override</span><span class="wf-card__route">/admin/refunds · override-refund</span></div>
          <span class="chip planned">Planned</span>
        </div>
        <div class="wf-canvas">
          <div class="wf-split">
            <div>
              <div class="wf-table">
                <div class="wf-trow head"><span>User</span><span>Amount</span><span>Status</span></div>
                <div class="wf-trow"><span class="cell"><div class="wf-line w70"></div></span><span class="cell"><div class="wf-line w40"></div></span><span class="cell"><span class="chip built" style="padding:1px 5px;">done</span></span></div>
                <div class="wf-trow"><span class="cell"><div class="wf-line w60"></div></span><span class="cell"><div class="wf-line w40"></div></span><span class="cell"><span class="chip planned" style="padding:1px 5px;">pending</span></span></div>
              </div>
            </div>
            <div class="wf-vdivider"></div>
            <div>
              <p class="wf-cap">Override form</p>
              <div class="wf-form-row"><label>Amount</label><div class="wf-input"></div></div>
              <div class="wf-form-row"><label>Reason (20+ chars)</label><div class="wf-input"></div></div>
              <div class="wf-btn" style="margin-top:2px;">Issue refund</div>
            </div>
          </div>
        </div>
      </div>
</div>
</body>
</html>
