<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Badges + Audit log + Settings — Project Amazon PH Academy Wireframe</title>
<link rel="stylesheet" href="../assets/tokens.css">
</head>
<body>
<div class="page-shell">
  <p class="page-kicker"><a href="../README.md">← wireframes index</a></p>
  <h1 class="page-title">Badges + Audit log + Settings</h1>
  <p class="page-route">/admin/badges · /admin/audit-log · /admin/settings</p>
  <div class="wf-card span2">
        <div class="wf-card__head">
          <div class="wf-card__id"><span class="wf-card__name">Badges + Audit log + Settings</span><span class="wf-card__route">/admin/badges · /admin/audit-log · /admin/settings</span></div>
          <span class="chip planned">Planned</span>
        </div>
        <div class="wf-canvas">
          <div class="wf-split">
            <div>
              <p class="wf-cap">Badges</p>
              <div class="wf-badge-grid"><div class="wf-badge earned"></div><div class="wf-badge earned"></div><div class="wf-badge"></div></div>
            </div>
            <div class="wf-vdivider"></div>
            <div>
              <p class="wf-cap">Audit log (read-only)</p>
              <div class="wf-line w80"></div><div class="wf-line w70"></div>
              <span class="wf-navitem" style="align-self:flex-start;">Export CSV</span>
            </div>
            <div class="wf-vdivider"></div>
            <div>
              <p class="wf-cap">Settings</p>
              <div class="wf-form-row"><label>Refund window (days)</label><div class="wf-input"></div></div>
              <div class="wf-form-row"><label>Early-bird limit</label><div class="wf-input"></div></div>
            </div>
          </div>
        </div>
      </div>
</div>
</body>
</html>
