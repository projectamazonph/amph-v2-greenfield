<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Courses — list + module editor — AMPH Wireframe</title>
<link rel="stylesheet" href="../assets/tokens.css">
</head>
<body>
<div class="page-shell">
  <p class="page-kicker"><a href="../README.md">← wireframes index</a></p>
  <h1 class="page-title">Courses — list + module editor</h1>
  <p class="page-route">/admin/courses · /admin/courses/[id]/modules/[id]</p>
  <div class="wf-card span2">
        <div class="wf-card__head">
          <div class="wf-card__id"><span class="wf-card__name">Courses — list + module editor</span><span class="wf-card__route">/admin/courses · /admin/courses/[id]/modules/[id]</span></div>
          <span class="chip planned">Planned</span>
        </div>
        <div class="wf-canvas">
          <div class="wf-split">
            <div>
              <div class="wf-table">
                <div class="wf-trow head"><span>Title</span><span>Tier</span><span>Price</span><span>Pub.</span></div>
                <div class="wf-trow"><span class="cell"><div class="wf-line w80"></div></span><span class="cell"><div class="wf-line w40"></div></span><span class="cell"><div class="wf-line w30"></div></span><span class="cell"><span class="chip built" style="padding:1px 5px;">yes</span></span></div>
                <div class="wf-trow"><span class="cell"><div class="wf-line w70"></div></span><span class="cell"><div class="wf-line w40"></div></span><span class="cell"><div class="wf-line w30"></div></span><span class="cell"><span class="chip planned" style="padding:1px 5px;">draft</span></span></div>
              </div>
            </div>
            <div class="wf-vdivider"></div>
            <div>
              <p class="wf-cap">Module editor</p>
              <div class="wf-block tint"><div class="wf-line w60"></div><div class="wf-line w50"></div></div>
              <div class="wf-row"><span class="wf-navitem">⠿ Lesson 1</span><span class="wf-navitem">⠿ Lesson 2</span></div>
              <div class="wf-btn ghost" style="align-self:flex-start;">+ Add lesson</div>
            </div>
          </div>
        </div>
      </div>
</div>
</body>
</html>
