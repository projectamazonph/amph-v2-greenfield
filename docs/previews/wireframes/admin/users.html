<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Users — list + detail — Project Amazon PH Academy Wireframe</title>
<link rel="stylesheet" href="../assets/tokens.css">
</head>
<body>
<div class="page-shell">
  <p class="page-kicker"><a href="../README.md">← wireframes index</a></p>
  <h1 class="page-title">Users — list + detail</h1>
  <p class="page-route">/admin/users · /admin/users/[id]</p>
  <div class="wf-card span2">
        <div class="wf-card__head">
          <div class="wf-card__id"><span class="wf-card__name">Users — list + detail</span><span class="wf-card__route">/admin/users · /admin/users/[id]</span></div>
          <span class="chip planned">Planned</span>
        </div>
        <div class="wf-canvas">
          <div class="wf-split">
            <div>
              <p class="wf-cap">List</p>
              <div class="wf-row"><div class="wf-input" style="flex:1;"></div><span class="wf-navitem">Role ▾</span><span class="wf-navitem">Tier ▾</span></div>
              <div class="wf-table">
                <div class="wf-trow head"><span>Email</span><span>Role</span><span>Tier</span><span>XP</span></div>
                <div class="wf-trow"><span class="cell"><div class="wf-line w80"></div></span><span class="cell"><div class="wf-line w40"></div></span><span class="cell"><div class="wf-line w40"></div></span><span class="cell"><div class="wf-line w30"></div></span></div>
                <div class="wf-trow"><span class="cell"><div class="wf-line w70"></div></span><span class="cell"><div class="wf-line w40"></div></span><span class="cell"><div class="wf-line w40"></div></span><span class="cell"><div class="wf-line w30"></div></span></div>
              </div>
            </div>
            <div class="wf-vdivider"></div>
            <div>
              <div class="wf-row" style="justify-content:space-between;"><p class="wf-cap" style="margin:0;">Detail</p><span class="chip planned" style="padding:1px 5px;">Impersonate</span></div>
              <div class="wf-tabs"><span class="wf-tab active">Profile</span><span class="wf-tab">Enrollments</span><span class="wf-tab">Payments</span><span class="wf-tab">Audit</span></div>
              <div class="wf-line w70"></div><div class="wf-line w50"></div><div class="wf-line w60"></div>
            </div>
          </div>
        </div>
      </div>
</div>
</body>
</html>
