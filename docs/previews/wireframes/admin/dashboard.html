<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin dashboard — Project Amazon PH Academy Wireframe</title>
<link rel="stylesheet" href="../assets/tokens.css">
</head>
<body>
<div class="page-shell">
  <p class="page-kicker"><a href="../README.md">← wireframes index</a></p>
  <h1 class="page-title">Admin dashboard</h1>
  <p class="page-route">/admin</p>
  <div class="wf-card">
        <div class="wf-card__head">
          <div class="wf-card__id"><span class="wf-card__name">Admin dashboard</span><span class="wf-card__route">/admin</span></div>
          <span class="chip planned">Planned</span>
        </div>
        <div class="wf-canvas">
          <div class="wf-bar"><span class="wf-navitem">⚠ impersonation banner slot</span></div>
          <div class="wf-tiles">
            <div class="wf-tile"><span class="cap">Signups 24h</span><div class="num">—</div></div>
            <div class="wf-tile"><span class="cap">Revenue 7d</span><div class="num">—</div></div>
            <div class="wf-tile"><span class="cap">Active enr.</span><div class="num">—</div></div>
            <div class="wf-tile"><span class="cap">Refund rate</span><div class="num">—</div></div>
            <div class="wf-tile"><span class="cap">Sim attempts</span><div class="num">—</div></div>
            <div class="wf-tile"><span class="cap">+4 more</span><div class="num">…</div></div>
          </div>
          <div class="wf-row">
            <div class="wf-chart"><span class="cap">Revenue / day</span><div class="wf-bars"><i style="height:40%"></i><i style="height:60%"></i><i style="height:35%"></i><i style="height:80%" class="hi"></i><i style="height:55%"></i><i style="height:70%"></i></div></div>
            <div class="wf-chart"><span class="cap">Top simulators</span><div class="wf-hbars"><i style="width:90%" class="hi"></i><i style="width:60%"></i><i style="width:45%"></i></div></div>
          </div>
        </div>
      </div>
</div>
</body>
</html>
