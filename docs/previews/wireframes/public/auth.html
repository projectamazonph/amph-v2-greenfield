<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign up / Log in — AMPH Wireframe</title>
<link rel="stylesheet" href="../assets/tokens.css">
</head>
<body>
<div class="page-shell">
  <p class="page-kicker"><a href="../README.md">← wireframes index</a></p>
  <h1 class="page-title">Sign up / Log in</h1>
  <p class="page-route">/signup · /login</p>
  <div class="wf-card">
        <div class="wf-card__head">
          <div class="wf-card__id"><span class="wf-card__name">Sign up / Log in</span><span class="wf-card__route">/signup · /login</span></div>
          <span class="chip built">Signup built</span>
        </div>
        <div class="wf-canvas">
          <div class="wf-split">
            <div>
              <p class="wf-cap">Sign up</p>
              <div class="wf-form-row"><label>Name</label><div class="wf-input"></div></div>
              <div class="wf-form-row"><label>Email</label><div class="wf-input"></div></div>
              <div class="wf-form-row"><label>Password</label><div class="wf-input"></div></div>
              <div class="wf-btn" style="margin-top:4px;">Create account</div>
            </div>
            <div class="wf-vdivider"></div>
            <div>
              <p class="wf-cap">Log in <span class="chip ready" style="padding:1px 5px;">Ready</span></p>
              <div class="wf-form-row"><label>Email</label><div class="wf-input"></div></div>
              <div class="wf-form-row"><label>Password</label><div class="wf-input"></div></div>
              <div class="wf-btn" style="margin-top:4px;">Log in</div>
              <div class="wf-line w50" style="margin-top:6px;"></div>
            </div>
          </div>
        </div>
      </div>
</div>
</body>
</html>
