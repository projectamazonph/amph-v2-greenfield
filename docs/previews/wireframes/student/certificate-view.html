<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Certificate view — Project Amazon PH Academy Wireframe</title>
<link rel="stylesheet" href="../assets/tokens.css">
</head>
<body>
<div class="page-shell">
  <p class="page-kicker"><a href="../README.md">← wireframes index</a></p>
  <h1 class="page-title">Certificate view</h1>
  <p class="page-route">/certificates/[hash]</p>
  <div class="wf-card">
        <div class="wf-card__head">
          <div class="wf-card__id"><span class="wf-card__name">Certificate view</span><span class="wf-card__route">/certificates/[hash]</span></div>
          <span class="chip built">Built</span>
        </div>
        <div class="wf-canvas" style="align-items:center;">
          <div class="wf-block tint" style="width:80%;text-align:center;">
            <p class="wf-cap" style="text-align:center;">Certificate of completion</p>
            <div class="wf-line thick w60" style="margin:6px auto;"></div>
            <div class="wf-line w40" style="margin:4px auto;"></div>
            <div style="font-family:var(--mono);font-size:8px;color:var(--ink-500);margin-top:6px;">sha256:a91f…c02e</div>
            <div class="wf-row" style="justify-content:center;margin-top:6px;"><span class="chip built">Verified ✓</span><span class="wf-btn ghost">Download PDF</span></div>
          </div>
        </div>
      </div>
</div>
</body>
</html>
