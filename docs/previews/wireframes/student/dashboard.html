<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard — Project Amazon PH Academy Wireframe</title>
<link rel="stylesheet" href="../assets/tokens.css">
</head>
<body>
<div class="page-shell">
  <p class="page-kicker"><a href="../README.md">← wireframes index</a></p>
  <h1 class="page-title">Dashboard</h1>
  <p class="page-route">/dashboard</p>
  <div class="wf-card">
        <div class="wf-card__head">
          <div class="wf-card__id"><span class="wf-card__name">Dashboard</span><span class="wf-card__route">/dashboard</span></div>
          <span class="chip ready">Ready</span>
        </div>
        <div class="wf-canvas">
          <div class="wf-bar"><div class="wf-navitems"><span class="wf-navitem">Home</span><span class="wf-navitem">Courses</span><span class="wf-navitem">Tools</span><span class="wf-navitem">Badges</span></div><div class="wf-avatar"></div></div>
          <div class="wf-tiles">
            <div class="wf-tile"><span class="cap">XP</span><div class="num">2,140</div></div>
            <div class="wf-tile"><span class="cap">Streak</span><div class="num">6d</div></div>
            <div class="wf-tile"><span class="cap">Enrolled</span><div class="num">2</div></div>
            <div class="wf-tile"><span class="cap">Sim runs</span><div class="num">14</div></div>
          </div>
          <div class="wf-block tint"><p class="wf-cap">Continue learning</p><div class="wf-line w70"></div><div class="wf-meter"><i style="width:62%"></i></div><div class="wf-btn" style="margin-top:5px;">Resume</div></div>
          <div class="wf-badge-grid"><div class="wf-badge earned"></div><div class="wf-badge earned"></div><div class="wf-badge"></div><div class="wf-badge"></div></div>
        </div>
      </div>
</div>
</body>
</html>
