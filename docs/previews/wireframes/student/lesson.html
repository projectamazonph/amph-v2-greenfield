<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lesson — Project Amazon PH Academy Wireframe</title>
<link rel="stylesheet" href="../assets/tokens.css">
</head>
<body>
<div class="page-shell">
  <p class="page-kicker"><a href="../README.md">← wireframes index</a></p>
  <h1 class="page-title">Lesson</h1>
  <p class="page-route">/courses/[slug]/lessons/[id]</p>
  <div class="wf-card">
        <div class="wf-card__head">
          <div class="wf-card__id"><span class="wf-card__name">Lesson</span><span class="wf-card__route">/courses/[slug]/lessons/[id]</span></div>
          <span class="chip built">Built</span>
        </div>
        <div class="wf-canvas">
          <div class="wf-bar"><span class="wf-navitem">← Foundations</span><div class="wf-meter" style="width:80px;"><i style="width:40%"></i></div></div>
          <div class="wf-split">
            <div style="flex:2;">
              <div class="wf-block"><p class="wf-cap">Lesson body — 72ch max</p><div class="wf-line thick w80"></div><div class="wf-line w90"></div><div class="wf-line w90"></div><div class="wf-line w60"></div></div>
            </div>
            <div class="wf-vdivider"></div>
            <div>
              <p class="wf-cap">Module lessons</p>
              <div class="wf-line w80"></div><div class="wf-line w70"></div><div class="wf-line w75"></div>
            </div>
          </div>
          <div class="wf-bar"><span class="chip ready" style="padding:1px 6px;">+50 XP</span><div class="wf-btn">Mark complete → Next</div></div>
        </div>
      </div>
</div>
