name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch on a new push
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TURBO_TELEMETRY_DISABLED: 1
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  quality:
    name: Typecheck + Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate
        if: hashFiles('prisma/schema.prisma') != ''

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  architecture:
    name: Architecture (TDD + SOLID compliance)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run architecture compliance suite
        # Enforces 8 rules: use case coverage, entity coverage,
        # domain purity, dependency direction, single responsibility,
        # dependency inversion, port segregation, no circular deps.
        # See tests/architecture/*.test.ts for the full rule list.
        run: pnpm test:arch

  unit:
    name: Unit + integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: amph_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d amph_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/amph_test
      JWT_SECRET: test-secret-at-least-32-bytes-long-please
      PAYMONGO_SECRET: sk_test_dummy
      PAYMONGO_WEBHOOK_SECRET: whsec_test_dummy
      RESEND_API_KEY: re_test_dummy
      SENTRY_DSN: ""
      EMAIL_VERIFICATION_SECRET: test-verification-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma migrate deploy
      - run: pnpm prisma generate
      - run: pnpm test
      - run: pnpm test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: amph_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d amph_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/amph_test
      JWT_SECRET: test-secret-at-least-32-bytes-long-please
      PAYMONGO_SECRET: sk_test_dummy
      PAYMONGO_WEBHOOK_SECRET: whsec_test_dummy
      RESEND_API_KEY: re_test_dummy
      SENTRY_DSN: ""
      EMAIL_VERIFICATION_SECRET: test-verification-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma migrate deploy
      - run: pnpm prisma generate
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm build
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality, unit]
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/amph_test
      JWT_SECRET: test-secret-at-least-32-bytes-long-please
      PAYMONGO_SECRET: sk_test_dummy
      PAYMONGO_WEBHOOK_SECRET: whsec_test_dummy
      RESEND_API_KEY: re_test_dummy
      SENTRY_DSN: ""
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm build
