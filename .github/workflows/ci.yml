name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch on a new push
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TURBO_TELEMETRY_DISABLED: 1
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  quality:
    name: Typecheck + Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # fetch-depth: 0 so the full history is present locally. This
      # is required by gitleaks, which computes a diff range of
      # `base^..head` for pull_request events and needs the base's
      # parent commit to be resolvable. Without this, gitleaks errors
      # with "fatal: ambiguous argument '<base>^': unknown revision".
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate
        if: hashFiles('prisma/schema.prisma') != ''

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  architecture:
    name: Architecture (TDD + SOLID compliance)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run architecture compliance suite
        # Enforces 8 rules: use case coverage, entity coverage,
        # domain purity, dependency direction, single responsibility,
        # dependency inversion, port segregation, no circular deps.
        # See tests/architecture/*.test.ts for the full rule list.
        run: pnpm test:arch

  unit:
    name: Unit + integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: amph_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d amph_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/amph_test
      JWT_SECRET: test-secret-at-least-32-bytes-long-please
      PAYMONGO_SECRET: sk_test_dummy
      PAYMONGO_WEBHOOK_SECRET: whsec_test_dummy
      RESEND_API_KEY: re_test_dummy
      SENTRY_DSN: ""
      EMAIL_VERIFICATION_SECRET: test-verification-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma migrate deploy
      - run: pnpm prisma generate
      - run: pnpm test
      - run: pnpm test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: amph_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d amph_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/amph_test
      JWT_SECRET: test-secret-at-least-32-bytes-long-please
      PAYMONGO_SECRET: sk_test_dummy
      PAYMONGO_WEBHOOK_SECRET: whsec_test_dummy
      RESEND_API_KEY: re_test_dummy
      SENTRY_DSN: ""
      EMAIL_VERIFICATION_SECRET: test-verification-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma migrate deploy
      - run: pnpm prisma generate
      # Install ALL Playwright browser dependencies + system deps.
      # Specifying only `chromium` was leaving the worker process unable to
      # launch the bundled browser (the error mentions a `webkit-2311`
      # cache path that is a red herring; the real failure is that the
      # install step did not provision the OS-level libs the binary needs).
      # `playwright install --with-deps` (no arg) installs chromium,
      # firefox, webkit, AND the system shared libs they depend on.
      - run: pnpm exec playwright install --with-deps
      - run: pnpm build
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality, unit]
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/amph_test
      JWT_SECRET: test-secret-at-least-32-bytes-long-please
      PAYMONGO_SECRET: sk_test_dummy
      PAYMONGO_WEBHOOK_SECRET: whsec_test_dummy
      RESEND_API_KEY: re_test_dummy
      SENTRY_DSN: ""
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm build
      - name: Verify .next/ exists before upload
        # Diagnostic step: surface the build output presence so the
        # upload step never silently produces an empty artifact.
        run: |
          if [ ! -d .next ]; then
            echo "::error::.next/ directory is missing after pnpm build"
            exit 1
          fi
          echo "Build output present:"
          du -sh .next
          ls -la .next | head -10
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build
          # include-hidden-files is required: .next/cache contains
          # hidden files (.previewinfo, .rscinfo, .tsbuildinfo) that
          # actions/upload-artifact@v4 skips by default. Without
          # this flag, the upload step warns "No files were found"
          # and the Lighthouse job downstream can't find the build.
          # See https://github.com/actions/upload-artifact/issues/232
          include-hidden-files: true
          path: .next

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    env:
      # Next.js needs a real DATABASE_URL to start the server. The
      # lighthouse job doesn't have access to the test Postgres
      # service, so we point at a dummy URL — the server will start
      # (Next.js only connects lazily on the first DB-touching page)
      # and the public pages we test (/, /courses, /signup) don't
      # hit the DB on the request path. If the server fails to start
      # because of this, the diagnostic verify step will catch it.
      DATABASE_URL: postgresql://test:test@localhost:5432/amph_test
      JWT_SECRET: test-secret-at-least-32-bytes-long-please
      PAYMONGO_SECRET: sk_test_dummy
      PAYMONGO_WEBHOOK_SECRET: whsec_test_dummy
      RESEND_API_KEY: re_test_dummy
      SENTRY_DSN: ""
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
        # The .next/ artifact references a hashed Prisma client
        # (e.g. @prisma/client-<hash>) that lives in the pnpm store.
        # The build job generated it, but the artifact only contains
        # .next/. We need to regenerate it in this job so the
        # server can find the client at runtime. pnpm + Prisma 7
        # places the generated client at:
        #   node_modules/.pnpm/@prisma+client@<hash>/node_modules/@prisma/client/.prisma/client/default
        # which is where Next.js's bundled module expects it.
      - uses: actions/download-artifact@v4
        with:
          name: build
          path: .next/
      - name: Copy Prisma client into .next/node_modules for the bundled module
        # The .next/ artifact contains a bundled module at
        #   .next/node_modules/@prisma/client-<hash>/default.js
        # which does `require('.prisma/client/default')` relative
        # to its own directory. The .next/ artifact also has a
        # symlink for that directory pointing to a pnpm-store path,
        # but pnpm's content-hash means the symlink target may not
        # exist after a fresh pnpm install in this job.
        #
        # Simplest reliable fix: put the generated .prisma/client/
        # directory right next to the bundled @prisma/client module
        # in .next/node_modules/. We do that by copying the generated
        # client from wherever prisma generate put it (the pnpm
        # store) into a sibling .prisma/ directory of the bundled
        # module. After this, the require resolves to:
        #   .next/node_modules/@prisma/client-<hash>/.prisma/client/default.js
        run: |
          set -e
          # Find the bundled module directory
          HASH_DIR=$(ls -d .next/node_modules/@prisma/client-* 2>/dev/null | head -1)
          if [ -z "$HASH_DIR" ]; then
            echo "::error::No @prisma/client-<hash> directory in .next/node_modules/"
            exit 1
          fi
          echo "Bundled module dir: $HASH_DIR"
          # Find where prisma generate put the client (in the pnpm store)
          GENERATED=$(find node_modules -path "*/.prisma/client/default.js" 2>/dev/null | head -1)
          if [ -z "$GENERATED" ]; then
            echo "::error::No generated Prisma client found in node_modules/"
            exit 1
          fi
          echo "Generated client: $GENERATED"
          # GENERATED is e.g.
          #   node_modules/.pnpm/@prisma+client@HASH/node_modules/.prisma/client/default.js
          # dirname x2: node_modules/.pnpm/@prisma+client@HASH/node_modules/.prisma
          PRISMA_DIR=$(dirname "$(dirname "$GENERATED")")
          echo "Prisma source dir: $PRISMA_DIR"
          # Copy the .prisma/ directory into the bundled module's directory
          rm -rf "$HASH_DIR/.prisma"
          cp -r "$PRISMA_DIR" "$HASH_DIR/.prisma"
          echo "✓ Copied $PRISMA_DIR to $HASH_DIR/.prisma/"
          ls -la "$HASH_DIR/.prisma/client/" | head -5
      - name: Verify build artifact is present
        # Diagnostic: if the artifact didn't upload, the build job's
        # warning would have been easy to miss. Surface the state here
        # so a Lighthouse failure is clearly attributable to a missing
        # artifact, not a Lighthouse config bug.
        run: |
          if [ ! -d .next ]; then
            echo "::error::.next/ directory is missing after download-artifact. The build job likely failed to upload."
            exit 1
          fi
          if [ ! -f .next/BUILD_ID ]; then
            echo "::error::.next/BUILD_ID is missing. The artifact is not a valid Next.js build."
            exit 1
          fi
          echo "Build artifact verified:"
          du -sh .next
          cat .next/BUILD_ID
      - name: Start Next.js server in background
        # Start the production server on port 3000 in the background
        # so Lighthouse has something to audit. We do this manually
        # instead of relying on lhci's startServerCommand config
        # because that path requires a working `staticDistDir` setup
        # for our Next.js standalone build, and we've already split
        # build + lighthouse into two jobs (so the server has to be
        # started by this job, not by lhci's parent context).
        # We redirect logs to a file so we can grep them on failure.
        run: |
          nohup pnpm start > /tmp/next-server.log 2>&1 &
          echo "Server PID: $!"
          # Wait up to 60s for the server to be ready
          for i in {1..60}; do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Server is ready after ${i}s"
              curl -s http://localhost:3000/api/health
              exit 0
            fi
            sleep 1
          done
          echo "::error::Server failed to start within 60s. Logs:"
          cat /tmp/next-server.log
          exit 1
      - name: Run Lighthouse CI
        # Now that the server is up, run lighthouse against it. The
        # config no longer needs startServerCommand (the server is
        # already running, lhci just hits the URLs).
        run: |
          pnpm dlx @lhci/cli@0.14.x autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
      - name: Stop Next.js server
        # Always stop the server, even on failure, to avoid leaving
        # orphan processes. The 'if: always()' ensures this runs.
        if: always()
        run: |
          pkill -f "next-server" || true
          pkill -f "next start" || true
